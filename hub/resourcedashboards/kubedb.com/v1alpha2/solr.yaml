apiVersion: ui.k8s.appscode.com/v1alpha1
kind: ResourceDashboard
metadata:
  labels:
    k8s.io/group: kubedb.com
    k8s.io/kind: Solr
    k8s.io/resource: solrs
    k8s.io/version: v1alpha2
  name: kubedb.com-v1alpha2-solrs
spec:
  dashboards:
  - title: KubeDB / Solr / Summary
    vars:
    - name: namespace
      value: '{{ .metadata.namespace }}'
    - name: app
      value: '{{ .metadata.name }}'
  - title: KubeDB / Solr / Database
    vars:
    - name: namespace
      value: '{{ .metadata.namespace }}'
    - name: app
      value: '{{ .metadata.name }}'
  - title: KubeDB / Solr / Pod
    vars:
    - name: namespace
      value: '{{ .metadata.namespace }}'
    - name: app
      value: '{{ .metadata.name }}'
  provider: Grafana
  resource:
    group: kubedb.com
    kind: Solr
    name: solrs
    scope: Namespaced
    version: v1alpha2
