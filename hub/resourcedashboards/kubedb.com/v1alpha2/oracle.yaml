apiVersion: ui.k8s.appscode.com/v1alpha1
kind: ResourceDashboard
metadata:
  labels:
    k8s.io/group: kubedb.com
    k8s.io/kind: Oracle
    k8s.io/resource: oracles
    k8s.io/version: v1alpha2
  name: kubedb.com-v1alpha2-oracles
spec:
  dashboards:
  - title: KubeDB / Oracle / Summary
    vars:
    - name: namespace
      value: '{{ .metadata.namespace }}'
    - name: app
      value: '{{ .metadata.name }}'
  - title: KubeDB / Oracle / Database
    vars:
    - name: namespace
      value: '{{ .metadata.namespace }}'
    - name: app
      value: '{{ .metadata.name }}'
  - title: KubeDB / Oracle / Pod
    vars:
    - name: namespace
      value: '{{ .metadata.namespace }}'
    - name: app
      value: '{{ .metadata.name }}'
  provider: Grafana
  resource:
    group: kubedb.com
    kind: Oracle
    name: oracles
    scope: Namespaced
    version: v1alpha2
