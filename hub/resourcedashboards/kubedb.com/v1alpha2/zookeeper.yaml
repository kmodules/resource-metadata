      value: '{{ .metadata.name }}'
  - title: KubeDB / ZooKeeper / Database
    vars:
    - name: namespace
      value: '{{ .metadata.namespace }}'
    - name: app
      value: '{{ .metadata.name }}'
  - title: KubeDB / ZooKeeper / Pod
    vars:
    - name: namespace
      value: '{{ .metadata.namespace }}'
    - name: app
      value: '{{ .metadata.name }}'
  provider: Grafana
  resource:
    group: kubedb.com
    kind: ZooKeeper
    name: zookeepers
    scope: Namespaced
    version: v1alpha2
