apiVersion: ui.k8s.appscode.com/v1alpha1
kind: ResourceEditor
metadata:
  labels:
    k8s.io/group: rds.aws.kubedb.com
    k8s.io/kind: Cluster
    k8s.io/resource: clusters
    k8s.io/version: v1alpha1
  name: rds.aws.kubedb.com-v1alpha1-clusters
spec:
  resource:
    group: rds.aws.kubedb.com
    kind: Cluster
    name: clusters
    scope: Cluster
    version: v1alpha1
  ui:
    editor:
      name: rdsawskubedbcom-cluster-editor
      sourceRef:
        apiGroup: source.toolkit.fluxcd.io
        kind: HelmRepository
        name: appscode-wizards-oci
      version: sha256:a9959bf8ad58fae5907140739cf1234ebb05b8b509350e5969e533451d1cc764
    enforceQuota: false
  variants:
  - name: MariaDB
    selector:
      matchLabels:
        rds.aws.kubedb.com/engine: mariadb
  - name: MySQL
    selector:
      matchLabels:
        rds.aws.kubedb.com/engine: mysql
  - name: PostgreSQL
    selector:
      matchLabels:
        rds.aws.kubedb.com/engine: postgres
