  resource:
    group: kubedb.com
    kind: Elasticsearch
    name: elasticsearches
    scope: Namespaced
    version: v1alpha2
  ui:
    actions:
    - items:
      - editor:
          name: kubedbcom-elasticsearch-editor
          sourceRef:
            apiGroup: source.toolkit.fluxcd.io
